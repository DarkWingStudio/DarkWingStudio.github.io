<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — DarkWing Studio</title>
  <meta name="description" content="Connect with DarkWing Studio for freelance builds, creative direction, and anime-inspired digital work." />
  <meta property="og:title" content="Contact — DarkWing Studio" />
  <meta property="og:description" content="Reach out to DarkWing Studio for freelance work and creative collaborations." />
  <meta property="og:image" content="assets/og/og.jpg" />
  <link rel="icon" type="image/jpeg" href="assets/icons/logo.jpeg"  />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Space+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/contact.css">
</head>
<body>
  <header class="site-header" id="site-header">
    <!-- Header will be loaded by partials.js -->
  </header>

  <main>
    <section class="contact-hero container">
      <div class="contact-copy">
        <p class="eyebrow">Contact</p>
        <h1>Let's build your next cinematic product.</h1>
        <p class="page-lead">Send a short brief or request a quote. Available for freelance and creative collaborations.</p>
        <div class="contact-status">
          <span class="status-indicator status-online"></span>
          <span>Available for work</span>
        </div>
      </div>
      <form class="contact-form" id="contactForm">
        <label>
          <span>Name</span>
          <input type="text" name="name" placeholder="Rohit" required>
        </label>
        <label>
          <span>Email</span>
          <input type="email" name="email" placeholder="hello@darkwingstudio.com" required>
        </label>
        <label>
          <span>Message</span>
          <textarea name="message" rows="6" placeholder="Tell me about your project..." required></textarea>
        </label>
        <button type="submit" class="btn btn-primary">Send Message</button>
        <p class="form-note" id="formNote"></p>
      </form>
    </section>

    <section class="contact-details container">
      <div class="details-card">
        <h2>Reach out directly</h2>
        <p><strong>Email</strong> <a href="mailto:hello@darkwingstudio.com">hello@darkwingstudio.com</a></p>
        <p><strong>Discord</strong> <span>DarkWing#9901</span></p>
        <p><strong>Socials</strong> <a href="#" target="_blank" rel="noreferrer noopener">GitHub</a> · <a href="#" target="_blank" rel="noreferrer noopener">Instagram</a></p>
      </div>
    </section>
  </main>

  <footer class="site-footer" id="site-footer">
    <!-- Footer will be loaded by partials.js -->
  </footer>

  <script defer src="js/utils.js"></script>
  <script defer src="js/meta.js"></script>
  <script defer src="js/partials.js"></script>
  <script defer src="js/nav.js"></script>
  <script defer src="js/contact.js"></script>
</body>
</html>
